<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mensajes de Amor</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            padding: 20px;
            background: #fff;
            color: #000;
        }

        h1 {
            margin-bottom: 24px;
        }

        button {
            display: block;
            margin: 8px 0;
            padding: 12px 20px;
            background: #111;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #333;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            background: #f8f8f8;
            border-left: 4px solid #090;
        }
    </style>
</head>

<body>
    <h1>Mensajes de Amor</h1>
    <button onclick="alert('Buenos Días')">Buenos Días</button>
    <button onclick="alert('Buenas Noches')">Buenas Noches</button>
    <button onclick="alert('Enviados')">Enviados</button>
    <button onclick="alert('Agregar Mensaje')">Agregar Mensaje</button>
    <div class="status">Estado: <span style="color:green">● Online</span></div>
</body>

</html>

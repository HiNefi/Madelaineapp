<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensajes de Amor</title>
  <style>
    /* ═══════════════════════════════════════════
       BASE  ·  60% white  30% gray  10% black
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #111111;
      --gray-dark:  #555555;
      --gray-mid:   #999999;
      --gray-light: #E4E4E4;
      --gray-bg:    #F6F6F6;
      --white:      #FFFFFF;
      --border:     #DEDEDE;
      --radius:     12px;
      --shadow:     0 2px 20px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      background: var(--gray-bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ═══════════════════════════════════════════
       MAIN CARD
    ═══════════════════════════════════════════ */
    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 44px 36px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }

    .app-logo {
      font-size: 28px;
      text-align: center;
      margin-bottom: 6px;
    }
    .app-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: var(--black);
      letter-spacing: -0.4px;
    }
    .app-sub {
      font-size: 12px;
      color: var(--gray-mid);
      text-align: center;
      margin-top: 4px;
      margin-bottom: 28px;
    }

    /* ── WA status badge ───────────────────────── */
    .wa-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--gray-dark);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gray-light);
      flex-shrink: 0;
      transition: background .3s;
    }
    .dot.on  { background: var(--black); }
    .dot.off { background: var(--gray-mid); }
    .wa-badge button {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 11px;
      color: var(--gray-mid);
      cursor: pointer;
      text-decoration: underline;
    }
    .wa-badge button:hover { color: var(--black); }

    /* ── Nav buttons ────────────────────────────── */
    .nav-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--black);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s, border-color .12s;
      margin-bottom: 9px;
      text-align: left;
      gap: 10px;
    }
    .nav-btn:hover  { background: var(--gray-bg); border-color: #bbb; }
    .nav-btn:active { transform: scale(.99); }
    .nav-btn .icon  { font-size: 17px; }
    .nav-btn .arrow { margin-left: auto; color: var(--gray-light); font-size: 15px; }

    .nav-btn.primary {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
      margin-top: 6px;
    }
    .nav-btn.primary:hover { background: #2a2a2a; border-color: #2a2a2a; }
    .nav-btn.primary .arrow { color: #555; }

    /* ═══════════════════════════════════════════
       MODAL
    ═══════════════════════════════════════════ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--white);
      border-radius: 18px;
      width: 100%; max-width: 600px;
      max-height: 88vh;
      display: flex; flex-direction: column;
      overflow: hidden;
      transform: translateY(10px);
      transition: transform .2s;
      box-shadow: 0 8px 40px rgba(0,0,0,.15);
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-head {
      display: flex; align-items: center;
      padding: 18px 22px 15px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .modal-head h2 {
      font-size: 15px; font-weight: 600;
      color: var(--black); flex: 1;
    }
    .close-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: none;
      background: var(--gray-light);
      cursor: pointer;
      font-size: 13px;
      color: var(--gray-dark);
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: var(--border); }

    .modal-body {
      flex: 1; overflow-y: auto;
      padding: 18px 22px;
    }

    .modal-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
    }

    /* ── Table ─────────────────────────────────── */
    .msg-table {
      width: 100%; border-collapse: collapse;
    }
    .msg-table thead th {
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px;
      color: var(--gray-mid);
      padding: 0 10px 10px;
      text-align: left;
      border-bottom: 1.5px solid var(--border);
    }
    .msg-table thead th.center { text-align: center; }
    .msg-table tbody tr {
      border-bottom: 1px solid var(--gray-bg);
    }
    .msg-table tbody tr:last-child { border-bottom: none; }
    .msg-table tbody tr:hover { background: #fafafa; }
    .msg-table td {
      padding: 11px 10px;
      font-size: 13px;
      color: var(--black);
      vertical-align: top;
    }
    .msg-table td.tc { text-align: center; }
    .time-cell {
      font-size: 11px; color: var(--gray-mid);
      white-space: nowrap; padding-top: 13px !important;
      width: 80px;
    }
    .status-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      font-size: 11px; font-weight: 700;
    }
    .status-badge.sent    { background: var(--black); color: var(--white); }
    .status-badge.pending { background: var(--gray-light); color: var(--gray-mid); }
    .msg-text { line-height: 1.55; word-break: break-word; }

    /* ── Empty / loading ─────────────────────── */
    .empty {
      padding: 44px 20px; text-align: center;
      color: var(--gray-mid); font-size: 13px; line-height: 1.7;
    }
    .loading { padding: 30px; text-align: center; color: var(--gray-mid); font-size: 13px; }

    /* ── Form elements ───────────────────────── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px;
      color: var(--gray-dark);
      margin-bottom: 8px;
    }
    .form-textarea {
      width: 100%; min-height: 110px;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13.5px; color: var(--black);
      font-family: inherit; resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    .form-textarea::placeholder { color: var(--gray-light); }
    .form-textarea:focus { border-color: var(--black); }

    .radio-row { display: flex; gap: 10px; }
    .radio-opt { flex: 1; position: relative; }
    .radio-opt input { position: absolute; opacity: 0; width: 0; }
    .radio-lbl {
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 11px 10px;
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--gray-dark);
      transition: all .15s;
    }
    .radio-opt input:checked + .radio-lbl {
      border-color: var(--black);
      background: var(--black);
      color: var(--white);
    }

    /* ── Action buttons inside modals ─────────── */
    .action-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 12px 18px;
      border-radius: 10px; border: none;
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: background .12s;
    }
    .action-btn.dark  { background: var(--black); color: var(--white); }
    .action-btn.dark:hover { background: #2a2a2a; }
    .action-btn.light { background: var(--gray-bg); color: var(--black); border: 1.5px solid var(--border); }
    .action-btn.light:hover { background: var(--gray-light); }

    /* ── QR ──────────────────────────────────── */
    .qr-wrap { text-align: center; padding: 10px 0 20px; }
    .qr-wrap img {
      width: 220px; height: 220px; border-radius: 10px;
      border: 1px solid var(--border); object-fit: cover;
    }
    .qr-hint {
      margin-top: 14px; font-size: 12px;
      color: var(--gray-dark); line-height: 1.65;
    }

    /* ── Scrollbar ───────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════
     MAIN CARD
═══════════════════════════ -->
<div class="card">
  <div class="app-logo">💌</div>
  <h1 class="app-title">Mensajes de Amor</h1>
  <p class="app-sub">Mensajes programados para tu novia</p>

  <!-- WhatsApp status -->
  <div class="wa-badge">
    <div class="dot" id="waDot"></div>
    <span id="waText">Verificando conexión…</span>
    <button onclick="openQR()">Configurar</button>
  </div>

  <!-- Navigation -->
  <button class="nav-btn" onclick="openMessages('morning')">
    <span class="icon">☀️</span> Buenos Días · 7:00 AM
    <span class="arrow">›</span>
  </button>

  <button class="nav-btn" onclick="openMessages('night')">
    <span class="icon">🌙</span> Buenas Noches · 7:00 PM
    <span class="arrow">›</span>
  </button>

  <button class="nav-btn" onclick="openSent()">
    <span class="icon">✓</span> Enviados
    <span class="arrow">›</span>
  </button>

  <button class="nav-btn primary" onclick="openAdd(null)">
    <span class="icon">＋</span> Agregar Mensaje
    <span class="arrow">›</span>
  </button>
</div>


<!-- ═══════════════════════════
     MESSAGES MODAL
═══════════════════════════ -->
<div class="overlay" id="msgOverlay" onclick="bgClose(event,'msgOverlay')">
  <div class="modal">
    <div class="modal-head">
      <h2 id="msgTitle">Mensajes</h2>
      <button class="close-btn" onclick="close('msgOverlay')">✕</button>
    </div>
    <div class="modal-body" id="msgBody">
      <div class="loading">Cargando…</div>
    </div>
    <div class="modal-foot">
      <button class="action-btn dark" id="msgAddBtn">＋ Nuevo Mensaje</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════
     SENT MODAL
═══════════════════════════ -->
<div class="overlay" id="sentOverlay" onclick="bgClose(event,'sentOverlay')">
  <div class="modal">
    <div class="modal-head">
      <h2>Enviados</h2>
      <button class="close-btn" onclick="close('sentOverlay')">✕</button>
    </div>
    <div class="modal-body" id="sentBody">
      <div class="loading">Cargando…</div>
    </div>
  </div>
</div>


<!-- ═══════════════════════════
     ADD MESSAGE MODAL
═══════════════════════════ -->
<div class="overlay" id="addOverlay" onclick="bgClose(event,'addOverlay')">
  <div class="modal" style="max-width:460px">
    <div class="modal-head">
      <h2>Nuevo Mensaje</h2>
      <button class="close-btn" onclick="close('addOverlay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Mensaje</label>
        <textarea class="form-textarea" id="newMsgText"
          placeholder="Escribe tu mensaje aquí…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Programar para</label>
        <div class="radio-row">
          <div class="radio-opt">
            <input type="radio" name="slot" id="slotAM" value="7:00 AM" />
            <label class="radio-lbl" for="slotAM">☀️ 7:00 AM</label>
          </div>
          <div class="radio-opt">
            <input type="radio" name="slot" id="slotPM" value="7:00 PM" />
            <label class="radio-lbl" for="slotPM">🌙 7:00 PM</label>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="action-btn dark" onclick="saveMsg()">Guardar Mensaje</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════
     QR MODAL
═══════════════════════════ -->
<div class="overlay" id="qrOverlay" onclick="bgClose(event,'qrOverlay')">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <h2>Conectar WhatsApp</h2>
      <button class="close-btn" onclick="close('qrOverlay')">✕</button>
    </div>
    <div class="modal-body" id="qrBody">
      <div class="loading">Cargando QR…</div>
    </div>
    <div class="modal-foot" style="display:flex;gap:10px">
      <button class="action-btn light" onclick="loadQR()" style="flex:1">↺ Actualizar QR</button>
      <button class="action-btn dark"  onclick="testSend()" style="flex:1">Enviar Prueba</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════
     JAVASCRIPT
═══════════════════════════ -->
<script>
  /* ── helpers ──────────────────────────────── */
  const $ = id => document.getElementById(id);

  function open(id)  { $(id).classList.add('open'); }
  function close(id) { $(id).classList.remove('open'); }
  function bgClose(e, id) { if (e.target === $(id)) close(id); }

  function fmtDate(str) {
    if (!str) return '—';
    const d = new Date(str.replace(' ', 'T'));
    const day = d.toLocaleDateString('es-EC', {day:'2-digit',month:'2-digit'});
    const tm  = d.toLocaleTimeString('es-EC', {hour:'2-digit',minute:'2-digit',hour12:false});
    return `${day}\n${tm}`;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  /* ── WhatsApp status ──────────────────────── */
  async function checkWA() {
    try {
      const r = await fetch('/api/whatsapp/status');
      const d = await r.json();
      $('waDot').className  = 'dot ' + (d.connected ? 'on' : 'off');
      $('waText').textContent = d.connected ? 'WhatsApp conectado ✓' : 'WhatsApp desconectado';
    } catch { $('waText').textContent = 'Sin conexión al servidor'; }
  }

  /* ── Messages list ────────────────────────── */
  let currentSlot = 'morning';

  async function openMessages(slot) {
    currentSlot = slot;
    const label = slot === 'morning' ? '☀️ Buenos Días · 7:00 AM' : '🌙 Buenas Noches · 7:00 PM';
    $('msgTitle').textContent = label;
    $('msgAddBtn').onclick = () => openAdd(slot);
    open('msgOverlay');
    $('msgBody').innerHTML = '<div class="loading">Cargando mensajes…</div>';

    try {
      const r = await fetch(`/api/messages/${slot}`);
      const msgs = await r.json();
      $('msgBody').innerHTML = renderMsgTable(msgs);
    } catch {
      $('msgBody').innerHTML = '<div class="empty">Error al cargar los mensajes.</div>';
    }
  }

  function renderMsgTable(msgs) {
    if (!msgs.length) return `
      <div class="empty">
        No hay mensajes programados.<br>
        Presiona <strong>Nuevo Mensaje</strong> para agregar uno.
      </div>`;

    const rows = msgs.map(m => `
      <tr>
        <td class="time-cell">${esc(fmtDate(m.created_at))}</td>
        <td><div class="msg-text">${esc(m.message)}</div></td>
        <td class="tc">
          <span class="status-badge ${m.sent ? 'sent' : 'pending'}">
            ${m.sent ? '✓' : '✕'}
          </span>
        </td>
      </tr>`).join('');

    return `
      <table class="msg-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Mensaje</th>
            <th class="center">Estado</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  /* ── Sent archive ─────────────────────────── */
  async function openSent() {
    open('sentOverlay');
    $('sentBody').innerHTML = '<div class="loading">Cargando…</div>';

    try {
      const r    = await fetch('/api/messages/sent');
      const msgs = await r.json();

      if (!msgs.length) {
        $('sentBody').innerHTML = '<div class="empty">Aún no hay mensajes en el archivo.<br>Los mensajes enviados aparecen aquí después de 24 h.</div>';
        return;
      }

      const rows = msgs.map(m => `
        <tr>
          <td class="time-cell">${esc(fmtDate(m.sent_at))}</td>
          <td><div class="msg-text">${esc(m.message)}</div></td>
          <td class="time-cell" style="width:60px">${esc(m.schedule_time)}</td>
        </tr>`).join('');

      $('sentBody').innerHTML = `
        <table class="msg-table">
          <thead>
            <tr>
              <th>Enviado</th>
              <th>Mensaje</th>
              <th>Horario</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    } catch {
      $('sentBody').innerHTML = '<div class="empty">Error al cargar los mensajes.</div>';
    }
  }

  /* ── Add message ──────────────────────────── */
  function openAdd(slot) {
    $('newMsgText').value = '';
    document.querySelectorAll('input[name="slot"]').forEach(r => r.checked = false);
    if (slot === 'morning') $('slotAM').checked = true;
    if (slot === 'night')   $('slotPM').checked = true;
    open('addOverlay');
  }

  async function saveMsg() {
    const message  = $('newMsgText').value.trim();
    const slotEl   = document.querySelector('input[name="slot"]:checked');

    if (!message)  { alert('Por favor escribe un mensaje.'); return; }
    if (!slotEl)   { alert('Selecciona el horario (7:00 AM o 7:00 PM).'); return; }

    try {
      const r = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, schedule_time: slotEl.value })
      });
      const d = await r.json();
      if (d.success) {
        close('addOverlay');
        if ($('msgOverlay').classList.contains('open')) openMessages(currentSlot);
      } else {
        alert(d.error || 'Error al guardar.');
      }
    } catch { alert('Error de red.'); }
  }

  /* ── QR / WhatsApp setup ──────────────────── */
  async function openQR() { open('qrOverlay'); await loadQR(); }

  async function loadQR() {
    $('qrBody').innerHTML = '<div class="loading">Cargando pantalla de WhatsApp…</div>';
    try {
      const r = await fetch('/api/whatsapp/qr');
      const d = await r.json();
      if (d.screenshot) {
        $('qrBody').innerHTML = `
          <div class="qr-wrap">
            <img src="data:image/png;base64,${d.screenshot}" alt="WhatsApp Web" />
            <p class="qr-hint">
              Abre <strong>WhatsApp</strong> en tu teléfono →
              <strong>Dispositivos vinculados</strong> →
              <strong>Vincular dispositivo</strong> → escanea el QR.<br><br>
              La sesión queda guardada; solo necesitas escanear una vez.
            </p>
          </div>`;
      } else {
        $('qrBody').innerHTML = '<div class="empty">No se pudo obtener la pantalla.<br>Verifica que el servidor está corriendo.</div>';
      }
    } catch {
      $('qrBody').innerHTML = '<div class="empty">Error de conexión con el servidor.</div>';
    }
  }

  async function testSend() {
    const ok = confirm('¿Enviar un mensaje de prueba al número configurado?');
    if (!ok) return;
    try {
      const r = await fetch('/api/whatsapp/test', { method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ message: '¡Hola mi amor! 💕 Esto es un mensaje de prueba.' })
      });
      const d = await r.json();
      alert(d.success ? '✓ Mensaje de prueba enviado correctamente.' : '✕ Falló el envío. Verifica la conexión.');
      checkWA();
    } catch { alert('Error de red.'); }
  }

  /* ── Init ─────────────────────────────────── */
  checkWA();
  setInterval(checkWA, 30_000);
</script>
</body>
</html>

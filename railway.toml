[deploy]
# One worker is required so the WhatsApp Selenium singleton stays alive.
startCommand = "gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 app:app"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Mount a persistent volume at /data to keep:
#   - love_messages.db  (SQLite)
#   - whatsapp_session/ (Chrome profile / WA Web login)
# Create the volume in the Railway dashboard and attach it to /data.
